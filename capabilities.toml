# Capability claims for SemASM targets.
#
# `verify` / `pipeline_verify` / assemble / link / execute maturity levels
# describe the **build pipeline** (fixture assemble → link → run), for
# example the exit-code e2e jobs.
#
# `agent_verify` describes `semasm agent verify` (semantic gates + optional
# behavioral harness). Do not treat pipeline `verified_in_ci` as agent-complete.
#
# Legacy key `verify` remains a pipeline alias (schema 0.1). Prefer reading
# `pipeline_verify` and `agent_verify` when both are present.

schema_version = "0.1"

[workspace]
crates = [
    "semasm-core",
    "semasm-contract",
    "semasm-asir",
    "semasm-target",
    "semasm-build",
    "semasm-agent",
    "semasm-cli",
    "semasm-obj",
    "semasm-decode",
    "semasm-cfg",
    "semasm-x86",
    "semasm-aarch64",
    "semasm-riscv",
]

[[target]]
id = "x86_64-unknown-linux-gnu"
description = "x86-64 Linux, System V ABI, ELF"

[target.capabilities]
declared = "verified_in_unit_tests"
decode = "partial"
lower = "partial"
abi_analysis = "verified_in_unit_tests"
assemble = "experimental"
link = "experimental"
execute = "experimental"
verify = "experimental"
pipeline_verify = "experimental"
agent_verify = "verified_in_ci"

[target.evidence]
unit_tests = ["semasm-target::tests", "semasm-x86::abi", "semasm-build::pipeline"]
fixtures = [
    "fixtures/asm/exit.asm",
    "fixtures/asm/count_byte.asm",
    "fixtures/asm/count_byte_wrong.asm",
    "fixtures/asm/count_byte_syscall.asm",
    "fixtures/asm/count_byte_import.asm",
    "fixtures/asm/count_byte_noexport.asm",
    "fixtures/asm/count_byte_stack_imbalance.asm",
    "fixtures/asm/count_byte_callee_saved.asm",
    "fixtures/asm/count_byte_red_zone.asm",
    "fixtures/asm/count_byte_unknown_insn.asm",
    "fixtures/asm/count_byte_trailing_bytes.asm",
    "fixtures/asm/count_byte_wx.asm",
    "fixtures/asm/min_usize.asm",
    "fixtures/asm/min_usize_wrong.asm",
    "fixtures/asm/min_usize_write.asm",
    "fixtures/asm/min_usize_callee_saved.asm",
    "fixtures/asm/sum_i64.asm",
    "fixtures/asm/sum_i64_wrong.asm",
    "fixtures/asm/sum_i64_write.asm",
]
ci_jobs = ["decode (capstone)"]

[[target]]
id = "x86_64-pc-windows-msvc"
description = "x86-64 Windows, Microsoft x64 ABI, PE/COFF"

[target.capabilities]
declared = "verified_in_unit_tests"
decode = "partial"
lower = "partial"
abi_analysis = "verified_in_unit_tests"
assemble = "experimental"
link = "experimental"
execute = "experimental"
verify = "experimental"
pipeline_verify = "experimental"
agent_verify = "verified_in_ci"

[target.evidence]
unit_tests = ["semasm-target::tests", "semasm-x86::abi_win64", "semasm-obj::tests"]
fixtures = [
    "fixtures/asm/hello_win64.asm",
    "fixtures/asm/win64_clean.asm",
    "fixtures/asm/count_byte_win64.asm",
    "fixtures/asm/count_byte_wrong_win64.asm",
    "fixtures/asm/count_byte_win64_shadow.asm",
    "fixtures/asm/min_usize_win64.asm",
    "fixtures/asm/min_usize_wrong_win64.asm",
    "fixtures/asm/min_usize_write_win64.asm",
    "fixtures/asm/min_usize_callee_saved_win64.asm",
    "fixtures/asm/sum_i64_win64.asm",
    "fixtures/asm/sum_i64_wrong_win64.asm",
    "fixtures/asm/sum_i64_write_win64.asm",
]
ci_jobs = ["e2e (x86-64 Windows)"]

[[target]]
id = "aarch64-unknown-linux-gnu"
description = "AArch64 Linux, AAPCS64 ABI, ELF"

[target.capabilities]
declared = "verified_in_ci"
decode = "partial"
lower = "partial"
abi_analysis = "verified_in_unit_tests"
assemble = "verified_in_ci"
link = "verified_in_ci"
execute = "verified_in_ci"
verify = "verified_in_ci"
pipeline_verify = "verified_in_ci"
agent_verify = "verified_in_ci"

[target.evidence]
unit_tests = ["semasm-decode::tests", "semasm-aarch64::lower", "semasm-aarch64::abi"]
fixtures = ["fixtures/asm/exit_aarch64.S", "fixtures/asm/count_byte_aarch64.S"]
ci_jobs = ["e2e (AArch64 Linux)"]

[[target]]
id = "riscv64gc-unknown-linux-gnu"
description = "RV64 Linux, RISC-V psABI, ELF"

[target.capabilities]
declared = "verified_in_ci"
decode = "partial"
lower = "partial"
abi_analysis = "verified_in_unit_tests"
assemble = "verified_in_ci"
link = "verified_in_ci"
execute = "verified_in_ci"
verify = "verified_in_ci"
pipeline_verify = "verified_in_ci"
agent_verify = "verified_in_ci"

[target.evidence]
unit_tests = ["semasm-riscv::lower", "semasm-riscv::abi", "semasm-decode::tests"]
fixtures = ["fixtures/asm/exit_riscv64.S", "fixtures/asm/count_byte_riscv64.S"]
ci_jobs = ["e2e (RV64 Linux)"]

[[target]]
id = "riscv32imac-unknown-none-elf"
description = "RV32 bare-metal, RISC-V psABI, ELF"

[target.capabilities]
declared = "declared"
decode = "declared"
lower = "partial"
abi_analysis = "verified_in_unit_tests"
assemble = "unavailable"
link = "unavailable"
execute = "unavailable"
verify = "experimental"
pipeline_verify = "unavailable"
agent_verify = "declared"

[target.evidence]
unit_tests = ["semasm-riscv::lower", "semasm-riscv::abi"]
fixtures = []
ci_jobs = []

# Capability claims for SemASM targets.
#
# `verify` / `pipeline_verify` / assemble / link / execute maturity levels
# describe the **build pipeline** (fixture assemble → link → run), for
# example the exit-code e2e jobs.
#
# `agent_verify` describes `semasm agent verify` (semantic gates + optional
# behavioral harness). Do not treat pipeline `verified_in_ci` as agent-complete.
#
# Legacy key `verify` remains a pipeline alias (schema 0.1). Prefer reading
# `pipeline_verify` and `agent_verify` when both are present.
#
# Maturity follow-up M1 (post-M0 ownership map):
# - x86-64 Linux/Windows assemble/link/execute/pipeline_verify =
#   `verified_in_ci`, owned by CI jobs `e2e (x86-64 Linux)` and
#   `e2e (x86-64 Windows)` (pipeline corpus: exit.asm / Win64 PE build-run).
# - `agent_verify = verified_in_ci` is a separate claim; Win64 agent verify
#   steps in the Windows e2e job do **not** substitute for pipeline evidence.
# - decode/lower stay `partial` until mnemonic coverage and adversarial twins
#   close the known gaps (unknown insn / trailing bytes / WX / indirect).
# - AArch64/RV64 pipeline evidence is stronger than x86 decode/lower depth;
#   that asymmetry is intentional, not an oversight.
# - MemCmp agent harness: x86 (SysV + Win64) **and** AArch64/RISC-V (H3).
# - Write-shape (`replace_byte`/`memset`/`memcpy`) agent harness: x86 (SysV +
#   Win64) **and** AArch64/RISC-V (priority follow-on after H3). Sample-based
#   guard bytes on all those ISAs; still ≠ formal store-region proof (ADR 0004).
# - `memset` harness shape is resolved from the recognized contract oracle, not
#   vector layout alone, because `memset` intentionally reuses the read-only
#   BufferScan wire layout (see `HarnessShape::resolve_harness_shape`).
# - `memcpy` wire layout collides with MemCmp (two array/null buffers + length);
#   `resolve_harness_shape` disambiguates via the recognized contract oracle.
#   Overlap fail-closed (ADR 0003): synthesized `dst`/`src` are always
#   distinct fixture buffers, never aliased; the post-buffer Gate check
#   covers `dst` only (`src` is unchanged input, never echoed back).
# - Ownership map: docs/STABILIZATION_PROGRESS.md (maturity follow-up M0/M1).
# - Dx (decode/lower depth checklist + adversarial wave): the explicit
#   decode/lower bump-criteria checklist (owner CI jobs, coverage criteria,
#   fail-closed rule, sign-off requirement) lives in
#   docs/STABILIZATION_PROGRESS.md under "Decode/lower maturity bump
#   checklist (Dx)". Dx also added a second unmodelled-mnemonic class
#   (`count_byte_unknown_insn_cpuid*`, privileged/CPUID vs. the existing
#   AVX/SIMD `vzeroupper`) and a second trailing-bytes leaf twin
#   (`find_first_byte_trailing_bytes*`, alongside `count_byte_trailing_bytes*`).
#   Dx does **not** bump `decode`/`lower` — both stay `partial` below until
#   the Dx checklist owner signs off.

schema_version = "0.1"

[workspace]
crates = [
    "semasm-core",
    "semasm-contract",
    "semasm-asir",
    "semasm-target",
    "semasm-build",
    "semasm-agent",
    "semasm-cli",
    "semasm-obj",
    "semasm-decode",
    "semasm-cfg",
    "semasm-x86",
    "semasm-aarch64",
    "semasm-riscv",
]

[[target]]
id = "x86_64-unknown-linux-gnu"
description = "x86-64 Linux, System V ABI, ELF"

[target.capabilities]
declared = "verified_in_unit_tests"
decode = "partial"
lower = "partial"
abi_analysis = "verified_in_unit_tests"
assemble = "verified_in_ci"
link = "verified_in_ci"
execute = "verified_in_ci"
verify = "verified_in_ci"
pipeline_verify = "verified_in_ci"
agent_verify = "verified_in_ci"

[target.evidence]

contract_version = "0.1"

[function]
name = "memcpy"
summary = "regions.equal while alias proves same-base const disjoint → contract-expr failed"

[[function.parameters]]
name = "buf"
type = "ptr<u8>"

[[function.parameters]]
name = "length"
type = "usize"

[[function.returns]]
name = "status"
type = "usize"

[[function.requires]]
expression = "regions.equal(src, dst)"

[function.memory]

[[function.memory.regions]]
name = "src"
base = "buf"
offset = "0"
length = "8"
access = "read"

[[function.memory.regions]]
name = "dst"
base = "buf"
offset = "8"
length = "8"
access = "write"

[[function.memory.relations]]
left = "src"
right = "dst"
require = "disjoint"

[function.constraints]
no_heap = true

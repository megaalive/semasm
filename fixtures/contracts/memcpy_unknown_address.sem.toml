contract_version = "0.1"

[function]
name = "memcpy"
summary = "Same as memcpy but paired with unknown-address candidate (alias incomplete)"

[[function.parameters]]
name = "dst"
type = "ptr<u8>"
role = "input"

[[function.parameters]]
name = "src"
type = "ptr<const u8>"
role = "input"

[[function.parameters]]
name = "length"
type = "usize"
role = "input"

[[function.returns]]
name = "status"
type = "usize"

[[function.effects]]
kind = "memory_read"
region = "src[0..length]"

[[function.effects]]
kind = "memory_write"
region = "dst[0..length]"

[function.memory]

[[function.memory.regions]]
name = "src"
base = "src"
length = "length"
access = "read"

[[function.memory.regions]]
name = "dst"
base = "dst"
length = "length"
access = "write"

[[function.memory.relations]]
left = "src"
right = "dst"
require = "disjoint"
basis = "precondition"

[function.constraints]
no_heap = true
no_recursion = true
bounded_stack_bytes = 128

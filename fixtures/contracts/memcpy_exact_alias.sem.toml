contract_version = "0.1"

[function]
name = "memcpy"
summary = "Exact-alias fixture: same base param for src/dst regions; require=disjoint must fail"

[[function.parameters]]
name = "p"
type = "ptr<u8>"
role = "input"

[[function.parameters]]
name = "length"
type = "usize"
role = "input"

[[function.returns]]
name = "status"
type = "usize"

[[function.effects]]
kind = "memory_read"
region = "p[0..length]"

[[function.effects]]
kind = "memory_write"
region = "p[0..length]"

[function.memory]

[[function.memory.regions]]
name = "src"
base = "p"
length = "length"
access = "read"

[[function.memory.regions]]
name = "dst"
base = "p"
length = "length"
access = "write"

[[function.memory.relations]]
left = "src"
right = "dst"
require = "disjoint"

[function.constraints]
no_heap = true
no_recursion = true
bounded_stack_bytes = 128

contract_version = "0.1"

[function]
name = "memcmp"
summary = "Compare two buffers lexicographically as unsigned bytes"

[[function.parameters]]
name = "a"
type = "ptr<const u8>"
role = "input"

[[function.parameters]]
name = "b"
type = "ptr<const u8>"
role = "input"

[[function.parameters]]
name = "length"
type = "usize"
role = "input"

[[function.returns]]
name = "result"
type = "isize"

[[function.requires]]
expression = "regions.disjoint(a, b)"
reason = "Region/Alias + contract-expr-v1: a and b must be disjoint."

[[function.requires]]
expression = "length <= 4096"
reason = "Arbitrary safety limit for this fixture."

[[function.ensures]]
expression = "result >= -1"

[[function.ensures]]
expression = "result <= 1"

[[function.effects]]
kind = "memory_read"
region = "a[0..length]"

[[function.effects]]
kind = "memory_read"
region = "b[0..length]"

[function.memory]

[[function.memory.regions]]
name = "a"
base = "a"
length = "length"
access = "read"

[[function.memory.regions]]
name = "b"
base = "b"
length = "length"
access = "read"

[[function.memory.relations]]
left = "a"
right = "b"
require = "disjoint"
basis = "precondition"

[function.constraints]
no_heap = true
no_recursion = true
bounded_stack_bytes = 128

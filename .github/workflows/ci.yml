name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Doc
        run: cargo doc --workspace --no-deps

      - name: Contributor quickstart
        run: |
          cargo run -q -p semasm-cli -- --version
          cargo run -q -p semasm-cli -- status
          cargo run -q -p semasm-cli -- contract check fixtures/contracts/write_all.sem.toml

      - name: Prepare source packages
        if: matrix.os == 'ubuntu-latest'
        run: cargo package --workspace --no-verify --allow-dirty

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check workspace on MSRV
        run: cargo +1.85 check --workspace --all-targets --locked

      - name: Test workspace on MSRV
        run: cargo +1.85 test --workspace --no-default-features --locked

  linux-e2e:
    name: e2e (x86-64 Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y nasm binutils qemu-user

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Record tool versions
        run: |
          nasm --version
          ld --version | head -n 1
          objdump --version | head -n 1

      - name: Run Linux build, inspect, execute, and report scenarios
        run: |
          cargo test -p semasm-build -- --ignored --nocapture
          cargo test -p semasm-obj -- --ignored --nocapture

      - name: Verify canonical evidence across output roots
        shell: bash
        run: |
          set -euo pipefail
          first_root="$(mktemp -d)"
          second_root="$(mktemp -d)"
          trap 'rm -rf "$first_root" "$second_root"' EXIT
          cargo run -q -p semasm-cli -- build fixtures/asm/exit.asm \
            --target x86_64-unknown-linux-gnu --out-dir "$first_root" \
            --no-run --format json > "$first_root/report.json"
          cargo run -q -p semasm-cli -- build fixtures/asm/exit.asm \
            --target x86_64-unknown-linux-gnu --out-dir "$second_root" \
            --no-run --format json > "$second_root/report.json"
          first_hash="$(jq -er '.deterministic_evidence_sha256' "$first_root/report.json")"
          second_hash="$(jq -er '.deterministic_evidence_sha256' "$second_root/report.json")"
          test "$first_hash" = "$second_hash"

  windows-e2e:
    name: e2e (x86-64 Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: choco install nasm llvm --no-progress -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Record tool versions
        shell: pwsh
        run: |
          nasm --version
          lld-link --version

      - name: Run Windows PE build, inspect, and execute scenario
        run: cargo test -p semasm-build pipeline::tests::build_windows_pe_and_run -- --ignored --exact --nocapture

      - name: Win64 agent semantic gates and verify
        env:
          SEMASM_REQUIRE_TOOLCHAIN: "1"
        run: |
          cargo test -p semasm-cli --all-features commands::semantic_gate_tests::win64_candidate_passes_static_semantic_gates -- --ignored --exact --nocapture
          cargo test -p semasm-cli --all-features --test agent_verify_win64_execution_denied -- --ignored --nocapture
          cargo test -p semasm-cli --all-features --test agent_verify_win64_allow_execution -- --ignored --nocapture
          cargo test -p semasm-cli --all-features --test agent_verify_adversarial agent_verify_wrong_win64 -- --ignored --nocapture

  cross-target-e2e:
    name: e2e (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: AArch64 Linux
            prefix: aarch64-linux-gnu
            package: binutils-aarch64-linux-gnu
            runner: qemu-aarch64
            target: aarch64-unknown-linux-gnu
            source: fixtures/asm/exit_aarch64.S
          - name: RV64 Linux
            prefix: riscv64-linux-gnu
            package: binutils-riscv64-linux-gnu
            runner: qemu-riscv64
            target: riscv64gc-unknown-linux-gnu
            source: fixtures/asm/exit_riscv64.S
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-target tools
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.package }} qemu-user

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Assemble, link, inspect, and execute
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/cross-evidence
          object="target/cross-evidence/${{ matrix.prefix }}.o"
          executable="target/cross-evidence/${{ matrix.prefix }}"
          ${{ matrix.prefix }}-as "${{ matrix.source }}" -o "$object"
          ${{ matrix.prefix }}-ld -static -e _start "$object" -o "$executable"
          cargo run -q -p semasm-cli -- obj "$executable" --target "${{ matrix.target }}" --format json
          set +e
          ${{ matrix.runner }} "$executable"
          status=$?
          set -e
          test "$status" -eq 42

      - name: Agent static semantic gates for count_byte
        env:
          SEMASM_REQUIRE_TOOLCHAIN: "1"
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cargo test -p semasm-cli --all-features commands::semantic_gate_tests::aarch64_candidate_passes_static_semantic_gates -- --ignored --exact --nocapture
            cargo test -p semasm-cli --all-features --test agent_verify_cross_target agent_verify_aarch64 -- --ignored --nocapture
            cargo test -p semasm-cli --all-features --test agent_verify_adversarial agent_verify_wrong_aarch64 agent_verify_svc_aarch64 -- --ignored --nocapture
          else
            cargo test -p semasm-cli --all-features commands::semantic_gate_tests::riscv64_candidate_passes_static_semantic_gates -- --ignored --exact --nocapture
            cargo test -p semasm-cli --all-features --test agent_verify_cross_target agent_verify_riscv64 -- --ignored --nocapture
            cargo test -p semasm-cli --all-features --test agent_verify_adversarial agent_verify_wrong_riscv64 agent_verify_ecall_riscv64 -- --ignored --nocapture
          fi

  decode:
    name: decode (capstone)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm and verification tools
        run: sudo apt-get update && sudo apt-get install -y nasm binutils qemu-user

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy (capstone feature)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test (capstone feature)
        run: cargo test --workspace --all-features

      - name: Agent semantic-gate and verify integration tests
        run: |
          cargo test -p semasm-cli --all-features \
            commands::semantic_gate_tests::canonical_candidate_passes_static_semantic_gates \
            -- --ignored --exact --nocapture
          cargo test -p semasm-cli --all-features \
            commands::semantic_gate_tests::win64_candidate_passes_static_semantic_gates \
            -- --ignored --exact --nocapture
          cargo test -p semasm-cli --all-features --test agent_verify_execution_denied \
            -- --ignored --nocapture
          cargo test -p semasm-cli --all-features --test agent_verify_min_usize \
            -- --ignored --nocapture
          cargo test -p semasm-cli --all-features --test agent_verify_adversarial \
            agent_verify_wrong_sysv \
            agent_verify_syscall_sysv \
            agent_verify_import_sysv \
            agent_verify_noexport_sysv \
            -- --ignored --nocapture
        env:
          SEMASM_REQUIRE_TOOLCHAIN: "1"

      - name: Compile fuzz targets
        run: cargo check --manifest-path fuzz/Cargo.toml --bins --locked

      - name: CLI decode smoke
        run: |
          printf '\x31\xc0\xc3' > /tmp/sample.bin
          cargo run -q -p semasm-cli --features capstone -- decode /tmp/sample.bin --base 0
          printf '\x31\xc0\x48\xff\xc9\x75\xfb\xc3' > /tmp/loop.bin
          cargo run -q -p semasm-cli --features capstone -- cfg /tmp/loop.bin --base 0x1000

  # Optional advisory job; continues on missing cargo-deny in older setups
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Doc
        run: cargo doc --workspace --no-deps

      - name: CLI version
        run: cargo run -p semasm-cli -- --version

  linux-e2e:
    name: e2e (x86-64 Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y nasm binutils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Record tool versions
        run: |
          nasm --version
          ld --version | head -n 1
          objdump --version | head -n 1

      - name: Run Linux build, inspect, execute, and report scenarios
        run: cargo test -p semasm-build -- --ignored --nocapture

  windows-e2e:
    name: e2e (x86-64 Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: choco install nasm llvm --no-progress -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Record tool versions
        shell: pwsh
        run: |
          nasm --version
          lld-link --version

      - name: Run Windows PE build, inspect, and execute scenario
        run: cargo test -p semasm-build pipeline::tests::build_windows_pe_and_run -- --ignored --exact --nocapture

  decode:
    name: decode (capstone)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm
        run: sudo apt-get install -y nasm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy (capstone feature)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test (capstone feature)
        run: cargo test --workspace --all-features

      - name: CLI decode smoke
        run: |
          printf '\x31\xc0\xc3' > /tmp/sample.bin
          cargo run -q -p semasm-cli --features capstone -- decode /tmp/sample.bin --base 0
          printf '\x31\xc0\x48\xff\xc9\x75\xfb\xc3' > /tmp/loop.bin
          cargo run -q -p semasm-cli --features capstone -- cfg /tmp/loop.bin --base 0x1000

  # Optional advisory job; continues on missing cargo-deny in older setups
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

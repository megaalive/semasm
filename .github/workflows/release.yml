name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vMAJOR.MINOR.PATCH tag to package
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Verify version and source package
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)"
          test "$tag" = "v$version"
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features
          cargo package --workspace --no-verify

  package:
    name: Package (${{ matrix.name }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: semasm-linux-x86_64.tar.gz
          - name: windows-x86_64
            os: windows-latest
            archive: semasm-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release CLI
        run: cargo build --locked --release -p semasm-cli

      - name: Package Linux archive
        if: runner.os == 'Linux'
        shell: bash
        run: >-
          tar -czf "${{ matrix.archive }}" -C target/release semasm
          -C ../.. README.md CHANGELOG.md LICENSE-APACHE LICENSE-MIT

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP "semasm-release"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target/release/semasm.exe,README.md,CHANGELOG.md,LICENSE-APACHE,LICENSE-MIT -Destination $stage
          Compress-Archive -Path "$stage/*" -DestinationPath "${{ matrix.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish checksummed release
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate and verify checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum semasm-* > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: >-
          gh release create "$RELEASE_TAG" dist/semasm-* dist/SHA256SUMS
          --verify-tag --title "SemASM $RELEASE_TAG"
          --notes-file CHANGELOG.md
